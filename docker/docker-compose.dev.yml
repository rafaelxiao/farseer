version: "3.8"

# Dev: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  db:
    container_name: farseer-db-dev
    ports:
      - "5432:5432"

  backend:
    container_name: farseer-backend-dev
    ports:
      - "8173:8173"
    environment:
      ENVIRONMENT: dev
      DEBUG: "true"
      PORT: "8173"
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:5174"]'
    volumes:
      - ../backend/src:/app/src
