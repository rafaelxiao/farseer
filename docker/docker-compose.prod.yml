version: "3.8"

# Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    container_name: farseer-db-prod
    ports:
      - "5433:5432"

  backend:
    container_name: farseer-backend-prod
    ports:
      - "8174:8174"
    environment:
      ENVIRONMENT: prod
      DEBUG: "false"
      PORT: "8174"
      CORS_ORIGINS: '["http://localhost:5174"]'
    restart: unless-stopped
