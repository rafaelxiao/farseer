# Nginx config for Farseer
# Place in /etc/nginx/conf.d/ or include in nginx.conf

# Production: /farseer → localhost:8174
# Dev: /farseer/dev → localhost:8173

upstream farseer_prod {
    server 127.0.0.1:8174;
}

upstream farseer_dev {
    server 127.0.0.1:8173;
}

# Production
location /farseer/ {
    proxy_pass http://farseer_prod/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support (if needed)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

# Development
location /farseer/dev/ {
    proxy_pass http://farseer_dev/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support (if needed)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
